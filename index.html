<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Vehicle Performance Simulator</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
</head>

<body>
    <div id="ui-container">
        <div id="controls" class="panel">
            <h2>Simulation Setup</h2>
            <div class="control-group">
                <label for="circuitSelect">Race Circuit:</label>
                <select id="circuitSelect">
                    <option value="classic">High-Speed Classic</option>
                    <option value="forest">Forest Sprint</option>
                    <option value="city">City Street</option>
                </select>
                <div class="circuit-actions">
                    <button id="openDrawBtn">DRAW NEW CIRCUIT</button>
                    <div class="secondary-actions">
                        <button id="exportCircuitBtn" title="Export Custom Circuit">📤</button>
                        <button id="importCircuitBtn" title="Import Custom Circuit">📥</button>
                    </div>
                </div>
                <input type="file" id="circuitInput" style="display: none;" accept=".json">
            </div>
        </div>

        <div id="camera-panel" class="panel">
            <h2>Live Stats</h2>
            <div class="stat-item">
                <span class="label">Camera:</span>
                <span id="camMode" class="value">Chase</span>
            </div>
        </div>
    </div>

    <!-- Drawing Mode Modal -->
    <div id="draw-modal">
        <div class="panel modal-content">
            <div class="modal-header">
                <h2>Circuit Designer</h2>
                <button id="closeDrawBtn">&times;</button>
            </div>
            <p class="modal-desc">
                Click and drag on the canvas to draw your track path. The simulation will automatically smooth the curve
                and connect the ends.
            </p>
            <div id="canvas-container">
                <canvas id="draw-canvas"></canvas>
            </div>
            <div class="modal-actions">
                <button id="clearDrawBtn">CLEAR CANVAS</button>
                <button id="generateTrackBtn">GENERATE CIRCUIT</button>
            </div>
        </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
